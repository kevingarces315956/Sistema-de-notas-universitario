<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Notas Universitario</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>

    <div class="container">
        <header class="header">
            <h1>🎓 Sistema de Notas</h1>
            <p>Gestiona estudiantes, notas y promedios de forma sencilla</p>
        </header>

        <section class="grid">
            <div class="card">
                <h3><span class="icon">👤</span> Crear estudiante</h3>
                <div class="field">
                    <label for="cedula">Cédula</label>
                    <input type="text" id="cedula" placeholder="Ej: 12345678">
                </div>
                <div class="field">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
                </div>
                <button id="btn-crear" class="btn-success">Crear estudiante</button>
            </div>

            <div class="card">
                <h3><span class="icon">📝</span> Agregar nota</h3>
                <div class="field">
                    <label for="notaCedula">Cédula</label>
                    <input type="text" id="notaCedula" placeholder="Cédula del estudiante">
                </div>
                <div class="field">
                    <label for="notaValor">Nota (0 - 10)</label>
                    <input type="number" id="notaValor" placeholder="Ej: 8.5" min="0" max="10" step="0.1">
                </div>
                <button id="btn-agregar-nota">Agregar nota</button>
            </div>

            <div class="card">
                <h3><span class="icon">🗑️</span> Quitar última nota</h3>
                <div class="field">
                    <label for="quitarCedula">Cédula</label>
                    <input type="text" id="quitarCedula" placeholder="Cédula del estudiante">
                </div>
                <button id="btn-quitar" class="btn-danger">Quitar última nota</button>
            </div>

            <div class="card">
                <h3><span class="icon">📊</span> Ver promedio</h3>
                <div class="field">
                    <label for="verCedula">Cédula</label>
                    <input type="text" id="verCedula" placeholder="Cédula del estudiante">
                </div>
                <button id="btn-ver">Ver promedio</button>
            </div>
        </section>

        <section class="result-card">
            <h3>📋 Resultado</h3>
            <div id="resultado"></div>
        </section>

        <footer class="footer">
            <p>Hecho con Flask · SQLite · HTML5 · CSS3 · JavaScript</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
