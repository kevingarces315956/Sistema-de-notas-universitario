services:
  mi_universidad:
    build:
      context: ./mi_universidad
      dockerfile: Dockerfile
    image: mi-universidad:latest
    container_name: mi_universidad
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_PATH: /data/estudiantes.db
    volumes:
      - mi_universidad_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mi_universidad_data:
